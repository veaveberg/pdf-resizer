name: Build Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-apps-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles none

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          prefix-key: "v1"

      - name: Prepare portable Ghostscript runtime (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install ghostscript
          GS_PREFIX="$(brew --prefix ghostscript)"
          python3 scripts/prepare_macos_ghostscript_runtime.py \
            --brew-prefix "$GS_PREFIX" \
            --output-root src-tauri/bin/ghostscript

      - name: Prepare Ghostscript runtime and NSIS tools (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install ghostscript nsis -y
          New-Item -ItemType Directory -Force -Path src-tauri/bin | Out-Null
          Remove-Item -Recurse -Force src-tauri/bin/ghostscript-win -ErrorAction SilentlyContinue
          $gsRoot = Get-ChildItem "C:\Program Files\gs\gs*" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $gsRoot) { throw "Ghostscript installation folder not found." }
          Copy-Item $gsRoot.FullName "src-tauri/bin/ghostscript-win" -Recurse -Force

      - name: install frontend dependencies
        run: npm install

      - name: Build Tauri bundles
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Smoke test bundled Ghostscript (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          APP_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "macOS app bundle not found"
            exit 1
          fi
          GS_BIN="$APP_PATH/Contents/Resources/bin/ghostscript/bin/gs"
          if [ ! -x "$GS_BIN" ]; then
            echo "Bundled Ghostscript binary not found at: $GS_BIN"
            find "$APP_PATH/Contents/Resources" -maxdepth 5 -type f | sort || true
            exit 1
          fi
          python3 scripts/ghostscript_smoke.py --gs "$GS_BIN"

      - name: Build and smoke test NSIS installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/${{ matrix.target }}/release"
          $payloadDir = "$releaseDir/nsis-payload"
          $artifactDir = "artifacts"

          Remove-Item -Recurse -Force $payloadDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item "$releaseDir/PDF Resizer.exe" "$payloadDir/PDF Resizer.exe" -Force
          Copy-Item "src-tauri/bin/ghostscript-win" "$payloadDir/ghostscript-win" -Recurse -Force

          $gsExe = Get-ChildItem "$payloadDir/ghostscript-win/bin/gswin64c.exe" -File | Select-Object -First 1
          if (-not $gsExe) { throw "Staged Ghostscript binary not found." }
          python scripts/ghostscript_smoke.py --gs "$($gsExe.FullName)"

          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).package.version
          $outputFile = (Resolve-Path $artifactDir).Path + "\\PDF-Resizer-Windows.exe"
          $payloadAbs = (Resolve-Path $payloadDir).Path

          & makensis "/DAPP_VERSION=$version" "/DOUTPUT_FILE=$outputFile" "/DPAYLOAD_DIR=$payloadAbs" "src-tauri\\nsis\\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "makensis failed with exit code $LASTEXITCODE" }

          $installDir = "$env:TEMP\\pdfresizer-smoke-install"
          Remove-Item -Recurse -Force $installDir -ErrorAction SilentlyContinue
          & $outputFile /S "/D=$installDir"

          $installedGs = "$installDir\\ghostscript-win\\bin\\gswin64c.exe"
          if (!(Test-Path $installedGs)) { throw "Installed Ghostscript binary not found at $installedGs" }
          python scripts/ghostscript_smoke.py --gs "$installedGs"

          $uninstaller = "$installDir\\Uninstall PDF Resizer.exe"
          if (Test-Path $uninstaller) {
            & $uninstaller /S
          }

      - name: Prepare DMG artifact (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p artifacts
          DMG_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name "*.dmg" -type f | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "DMG artifact not found"
            exit 1
          fi
          cp "$DMG_PATH" "artifacts/PDF-Resizer-macOS.dmg"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Resizer-macOS
          if-no-files-found: error
          path: "artifacts/PDF-Resizer-macOS.dmg"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Resizer-Windows
          if-no-files-found: error
          path: "artifacts/PDF-Resizer-Windows.exe"

  publish_release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: artifacts

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PDF-Resizer-macOS.dmg
            artifacts/PDF-Resizer-Windows.exe
